<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Rewards Claim</title>
    <style>
        body {
            background-color: #0f172a; /* Dark background to match your site */
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* The Main Crate Container */
        .claim-container {
            background-color: #1e293b;
            border: 2px solid #4ade80; /* Default Green Border */
            border-radius: 8px;
            padding: 24px;
            width: 450px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: border-color 0.3s ease;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .header-row h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: bold;
        }

        .status-badge {
            color: #4ade80;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 0;
            margin-bottom: 24px;
            border-bottom: 1px dashed #334155;
            padding-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        /* Platform Dropdown */
        select {
            background-color: #334155;
            color: white;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 10px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Username Input */
        input[type="text"] {
            flex-grow: 1;
            background-color: #eff6ff;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        /* Claim Button */
        button {
            background-color: #4ade80;
            color: #064e3b;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* Message Text */
        .message {
            text-align: center;
            font-weight: bold;
            margin-top: 16px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div id="claimBox" class="claim-container">
        <div class="header-row">
            <h2>Social Verification</h2>
            <span class="status-badge">✓ Active</span>
        </div>
        <p class="subtitle">Select the platform you verified and enter your Minecraft IGN.</p>

        <form id="claimForm">
            <div class="form-row">
                <select id="platformSelect" name="platform">
                    <option value="YouTube">YouTube</option>
                    <option value="Discord">Discord</option>
                    <option value="Instagram">Instagram</option>
                    <option value="X">X (Twitter)</option>
                    <option value="TikTok">TikTok</option>
                </select>

                <input type="text" id="username" name="username" placeholder="BiteSterxBeastYT" required autocomplete="off">
                
                <button type="submit" id="claimBtn">Claim</button>
            </div>
        </form>

        <div id="messageText" class="message"></div>
    </div>

    <script>
        document.getElementById('claimForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page from refreshing
            
            const box = document.getElementById('claimBox');
            const msg = document.getElementById('messageText');
            const btn = document.getElementById('claimBtn');
            const formData = new FormData(this);
            
            // Visual loading state
            btn.innerText = "Wait...";
            btn.disabled = true;
            msg.innerText = "";
            
            fetch('claim.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btn.innerText = "Claim";
                btn.disabled = false;
                msg.innerText = data.message;
                
                // --- STATE 1: ALREADY CLAIMED (RED) ---
                if (data.status === 'already_claimed') {
                    box.style.borderColor = "#ef4444"; // Red border
                    msg.style.color = "#ef4444"; // Red text
                } 
                // --- STATE 2: SUCCESS (GREEN) ---
                else if (data.status === 'success') {
                    box.style.borderColor = "#4ade80"; // Green border
                    msg.style.color = "#4ade80"; // Green text
                } 
                // --- STATE 3: SERVER ERROR (RED) ---
                else {
                    box.style.borderColor = "#ef4444"; // Red border
                    msg.style.color = "#ef4444"; // Red text
                }
            })
            .catch(error => {
                btn.innerText = "Claim";
                btn.disabled = false;
                box.style.borderColor = "#ef4444";
                msg.style.color = "#ef4444";
                msg.innerText = "Website Error: Failed to connect to PHP script.";
                console.error(error);
            });
        });
    </script>

</body>
</html>

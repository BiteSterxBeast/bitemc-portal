<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Rewards Claim</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .claim-container {
            background-color: #1e293b;
            border: 2px solid #4ade80;
            border-radius: 8px;
            padding: 24px;
            width: 450px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: border-color 0.3s ease;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .header-row h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: bold;
        }

        .status-badge {
            color: #4ade80;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 0;
            margin-bottom: 24px;
            border-bottom: 1px dashed #334155;
            padding-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex-grow: 1;
            background-color: #eff6ff;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        button {
            background-color: #4ade80;
            color: #064e3b;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            min-width: 120px;
        }

        button:hover:not(:disabled) {
            opacity: 0.9;
        }

        button:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            font-weight: bold;
            margin-top: 16px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div id="claimBox" class="claim-container">
        <div class="header-row">
            <h2 id="platformTitle">YouTube Verification</h2>
            <span class="status-badge">✓ Active</span>
        </div>
        <p class="subtitle">Enter your Minecraft IGN to verify and claim your reward.</p>

        <form id="claimForm">
            <!-- Hidden input stores the platform name from the URL automatically! -->
            <input type="hidden" name="platform" id="hiddenPlatform" value="YouTube">
            
            <div class="form-row">
                <input type="text" id="username" name="username" placeholder="BiteSterxBeastYT" required autocomplete="off">
                <button type="submit" id="claimBtn" disabled>Wait 3s...</button>
            </div>
        </form>

        <div id="messageText" class="message"></div>
    </div>

    <script>
        // 1. Read the platform from the URL (e.g., ?platform=Discord)
        const urlParams = new URLSearchParams(window.location.search);
        let platform = urlParams.get('platform');
        
        // Default to YouTube if they just go to the site normally without a link
        if (!platform) { platform = "YouTube"; }

        // Update the UI dynamically
        document.getElementById('platformTitle').innerText = platform + " Verification";
        document.getElementById('hiddenPlatform').value = platform;

        // 2. The 3-Second Wait Rule
        const btn = document.getElementById('claimBtn');
        let timeLeft = 3;
        
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                btn.innerText = `Wait ${timeLeft}s...`;
            } else {
                clearInterval(countdown);
                btn.innerText = "Claim";
                btn.disabled = false;
            }
        }, 1000);

        // 3. Handle the Submission
        document.getElementById('claimForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const box = document.getElementById('claimBox');
            const msg = document.getElementById('messageText');
            const formData = new FormData(this);
            
            btn.innerText = "Wait...";
            btn.disabled = true;
            msg.innerText = "";
            
            fetch('claim.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btn.innerText = "Claim";
                btn.disabled = false;
                msg.innerText = data.message;
                
                if (data.status === 'already_claimed') {
                    box.style.borderColor = "#ef4444"; 
                    msg.style.color = "#ef4444"; 
                } else if (data.status === 'success') {
                    box.style.borderColor = "#4ade80"; 
                    msg.style.color = "#4ade80"; 
                } else {
                    box.style.borderColor = "#ef4444"; 
                    msg.style.color = "#ef4444"; 
                }
            })
            .catch(error => {
                btn.innerText = "Claim";
                btn.disabled = false;
                box.style.borderColor = "#ef4444";
                msg.style.color = "#ef4444";
                msg.innerText = "Website Error: Failed to connect to PHP script.";
                console.error(error);
            });
        });
    </script>

</body>
</html>

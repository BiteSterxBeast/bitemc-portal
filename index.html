<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteMC - Social Rewards Portal</title>
    <style>
        body {
            background-color: #0f1115;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #161920;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid #232834;
        }

        h1 {
            color: #55ff55;
            margin-bottom: 5px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #a0a5b5;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .social-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 10px;
        }

        .social-card {
            background-color: #1f232e;
            border: 1px solid #2d3345;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.2s ease;
        }

        .social-card.completed {
            border-color: #55ff55;
            background-color: rgba(85, 255, 85, 0.02);
        }

        .social-card.failed {
            border-color: #ff5555;
            background-color: rgba(255, 83, 83, 0.02);
        }

        .social-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .social-info {
            text-align: left;
        }

        .social-name {
            font-weight: bold;
            font-size: 16px;
        }

        .social-desc {
            font-size: 12px;
            color: #888e9e;
        }

        .btn {
            background-color: #5555ff;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
            display: inline-block;
        }

        .btn:hover:not(:disabled) {
            background-color: #3b3bff;
        }
        
        .btn:disabled {
            background-color: #3f4455;
            cursor: not-allowed;
            color: #888e9e;
        }

        .btn-retry {
            background-color: #ff5555;
        }

        .btn-retry:hover {
            background-color: #cc3333;
        }

        .status-txt {
            font-weight: bold;
            font-size: 14px;
        }

        .status-pending { color: #ffaa00; }
        .status-done { color: #55ff55; }
        .status-error { color: #ff5555; }

        .claim-zone {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #2d3345;
            animation: fadeIn 0.4s ease forwards;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input[type="text"] {
            background-color: #0f1115;
            border: 1px solid #2d3345;
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 60%;
            font-size: 14px;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: #55ff55;
            outline: none;
        }
        
        input[type="text"]:disabled {
            background-color: #1a1e29;
            color: #888e9e;
        }

        .btn-claim {
            background-color: #55ff55;
            color: #0f1115;
            padding: 10px 14px;
        }

        .btn-claim:hover:not(:disabled) {
            background-color: #33cc33;
        }
        
        .api-feedback {
            display: block;
            margin-top: 10px;
            font-size: 13px;
            color: #ff5555;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Social Rewards</h1>
        <p class="subtitle">Complete individual tasks below to grab your in-game loot!</p>

        <div class="social-list">
            <div class="social-card" id="card-yt">
                <div class="social-item">
                    <div class="social-info">
                        <div class="social-name">YouTube Channel</div>
                        <div class="social-desc">Subscribe to our main channel</div>
                    </div>
                    <div class="social-action" id="action-yt">
                        <a href="https://youtube.com" target="_blank" class="btn" onclick="startTracking('yt')">Follow Link</a>
                    </div>
                </div>
                <div class="claim-zone" id="claim-yt">
                    <div class="input-group">
                        <input type="text" id="user-yt" placeholder="Minecraft Username">
                        <button class="btn btn-claim" id="btn-yt" onclick="submitClaim('yt')">Claim</button>
                    </div>
                    <span class="api-feedback" id="feedback-yt"></span>
                </div>
            </div>

            <div class="social-card" id="card-tw">
                <div class="social-item">
                    <div class="social-info">
                        <div class="social-name">Twitter / X</div>
                        <div class="social-desc">Follow our official handle</div>
                    </div>
                    <div class="social-action" id="action-tw">
                        <a href="https://twitter.com" target="_blank" class="btn" onclick="startTracking('tw')">Follow Link</a>
                    </div>
                </div>
                <div class="claim-zone" id="claim-tw">
                    <div class="input-group">
                        <input type="text" id="user-tw" placeholder="Minecraft Username">
                        <button class="btn btn-claim" id="btn-tw" onclick="submitClaim('tw')">Claim</button>
                    </div>
                    <span class="api-feedback" id="feedback-tw"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activePlatform = null;
        let clickTime = 0;
        let verifyTimeout = null;

        const links = {
            yt: "https://youtube.com",
            tw: "https://twitter.com"
        };

        function startTracking(platform) {
            activePlatform = platform;
            clickTime = Date.now();
            
            const actionDiv = document.getElementById(`action-${platform}`);
            actionDiv.innerHTML = '<span class="status-txt status-pending">Verifying...</span>';

            verifyTimeout = setTimeout(() => {
                if (activePlatform === platform) {
                    executeVerificationSuccess(platform);
                }
            }, 7000);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && activePlatform !== null) {
                const timeSpentAway = (Date.now() - clickTime) / 1000;
                
                if (timeSpentAway < 3) {
                    clearTimeout(verifyTimeout);
                    executeVerificationFailure(activePlatform);
                }
            }
        });

        function executeVerificationSuccess(platform) {
            const actionDiv = document.getElementById(`action-${platform}`);
            const cardDiv = document.getElementById(`card-${platform}`);
            const claimZone = document.getElementById(`claim-${platform}`);
            
            actionDiv.innerHTML = '<span class="status-txt status-done">✓ Verified</span>';
            cardDiv.className = "social-card completed";
            claimZone.style.display = "block";
            
            if(activePlatform === platform) activePlatform = null;
        }

        function executeVerificationFailure(platform) {
            const actionDiv = document.getElementById(`action-${platform}`);
            const cardDiv = document.getElementById(`card-${platform}`);
            
            cardDiv.className = "social-card failed";
            actionDiv.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 5px; align-items: flex-end;">
                    <span class="status-txt status-error" style="font-size: 11px;">Verify invalid, try again</span>
                    <a href="${links[platform]}" target="_blank" class="btn btn-retry" style="padding: 6px 10px; font-size: 12px;" onclick="startTracking('${platform}')">Retry</a>
                </div>
            `;
            
            activePlatform = null;
        }

        async function submitClaim(platform) {
            const usernameInput = document.getElementById(`user-${platform}`);
            const btn = document.getElementById(`btn-${platform}`);
            const feedbackText = document.getElementById(`feedback-${platform}`);
            const actionDiv = document.getElementById(`action-${platform}`);
            
            const username = usernameInput.value.trim();
            
            if (username === "") {
                feedbackText.style.color = "#ff5555";
                feedbackText.innerText = "Please enter a valid Minecraft username!";
                return;
            }
            
            feedbackText.innerText = "";
            usernameInput.disabled = true;
            btn.disabled = true;
            btn.innerText = "Checking...";
            
            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('platform', platform);
                
                const response = await fetch('claim.php', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.status === "error") {
                    let cleanError = data.message.replace("[API-FAIL] ", "");
                    feedbackText.style.color = "#ff5555";
                    feedbackText.innerText = cleanError;
                    usernameInput.disabled = false;
                    btn.disabled = false;
                    btn.innerText = "Claim";
                    
                } else {
                    feedbackText.style.color = "#55ff55";
                    feedbackText.innerText = data.message;
                    btn.innerText = "Sent!";
                    actionDiv.innerHTML = '<span class="status-txt status-done">🎁 Claimed</span>';
                }
                
            } catch (error) {
                feedbackText.style.color = "#ff5555";
                feedbackText.innerText = "Could not connect to the server database. Try again later.";
                usernameInput.disabled = false;
                btn.disabled = false;
                btn.innerText = "Claim";
            }
        }
    </script>
</body>
</html>
